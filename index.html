<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>LimbahGuna — AI Waste Grading & Circular Economy</title>
    <meta name="description" content="LimbahGuna digitizes agricultural waste with AI-powered classification, quality grading, and real-time CO₂ tracking for the circular economy." />
    <link rel="canonical" href="https://limbahguna.lovable.app/" />

    <meta property="og:title" content="LimbahGuna — Sustainable Waste Management" />
    <meta property="og:description" content="AI-driven platform for circular economy and automated quality grading of agricultural waste." />
    <meta property="og:url" content="https://limbahguna.lovable.app/" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary" />

    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#16a34a" />
    <link rel="apple-touch-icon" href="/logo-192.png" />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "LimbahGuna",
        "url": "https://limbahguna.lovable.app/",
        "description": "AI-powered platform for agricultural waste classification, quality grading, and circular economy traceability."
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "LimbahGuna",
        "url": "https://limbahguna.lovable.app/"
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          // Cache-busting: append version to SW URL to force re-download
          navigator.serviceWorker.register('/sw.js?v=3-universal')
            .then(registration => {
              // Check for updates immediately
              registration.update();

              // Listen for new service worker installing
              registration.addEventListener('updatefound', () => {
                const newWorker = registration.installing;
                if (newWorker) {
                  newWorker.addEventListener('statechange', () => {
                    if (newWorker.state === 'activated') {
                      // New SW activated - reload to get fresh content
                      console.log('[App] New service worker activated, reloading...');
                      window.location.reload();
                    }
                  });
                }
              });
            })
            .catch(err => console.error('[SW] Registration failed:', err));
        });
      }
    </script>
  </body>
</html>
